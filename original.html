<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내부 문서 - 테스트</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #0066cc; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #0066cc; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; color: white; }
        .dev { background: #28a745; }
        .stage { background: #fd7e14; }
        .prod { background: #dc3545; }
    </style>
</head>
<body>
    <h1>내부 문서 (테스트)</h1>
    <p>이 페이지는 비밀번호로 보호된 내부 문서 테스트입니다.</p>

    <h2>환경 정보</h2>
    <table>
        <tr><th>환경</th><th>클러스터</th><th>상태</th></tr>
        <tr><td><span class="badge dev">DEV</span></td><td>crossdev-svc-eks</td><td>Running</td></tr>
        <tr><td><span class="badge stage">STAGE</span></td><td>crossstage-svc-eks</td><td>Running</td></tr>
        <tr><td><span class="badge prod">PROD</span></td><td>crossprod-svc-eks</td><td>Running</td></tr>
    </table>

    <h2>메모</h2>
    <ul>
        <li>이 문서는 StaticCrypt로 암호화되어 있습니다.</li>
        <li>비밀번호를 입력해야 내용을 볼 수 있습니다.</li>
        <li>브라우저 세션 동안 비밀번호가 유지됩니다.</li>
    </ul>
</body>
</html>
